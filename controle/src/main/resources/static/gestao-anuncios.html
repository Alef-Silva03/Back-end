<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderação de Anúncios - Lar Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #012E46; --verde: #007A8A; --laranja: #F29100; }
        body { background-color: #f4f7f6; font-family: 'Montserrat', sans-serif; }
        .navbar-admin { background-color: var(--azul); }
        .card-pendente { border-left: 5px solid var(--laranja); border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-aprovar { background-color: var(--verde); color: white; border: none; }
        .btn-aprovar:hover { background-color: #005f6b; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-admin shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-shield-lock me-2"></i> Painel do Síndico
            </a>
            <span class="navbar-text text-white">Moderação de Classificados</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold" style="color: var(--azul)">Anúncios Pendentes</h2>
                <p class="text-muted">Analise os itens antes de publicá-los para todos os moradores.</p>
            </div>
        </div>

        <div class="row g-3" id="listaPendentes">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <script>
        // Verificação de segurança (apenas SINDICO pode acessar)
        const user = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!user || user.tipoUsuario !== 'SINDICO') {
            alert("Acesso restrito ao síndico!");
            window.location.href = 'dashboard.html';
        }

        async function carregarPendentes() {
            try {
                const res = await fetch('http://localhost:8080/api/usuarios/anuncios/pendentes');
                const anuncios = await res.json();
                const container = document.getElementById('listaPendentes');

                if (anuncios.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5 bg-white rounded shadow-sm">
                            <i class="bi bi-check-circle fs-1 text-success"></i>
                            <p class="mt-2 fw-bold">Não há anúncios pendentes de aprovação.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = anuncios.map(a => `
                    <div class="col-12">
                        <div class="card card-pendente p-3 mb-2">
                            <div class="row align-items-center">
                                <div class="col-md-2">
                                    <span class="badge bg-warning text-dark">${a.tipo}</span>
                                </div>
                                <div class="col-md-4">
                                    <h6 class="mb-0 fw-bold">${a.titulo}</h6>
                                    <small class="text-muted">${a.descricao}</small>
                                </div>
                                <div class="col-md-2 text-center">
                                    <span class="fw-bold text-success">R$ ${a.valor.toFixed(2)}</span>
                                    <br><small class="text-muted">Apto: ${a.anunciante?.numeroApartamento || 'N/A'}</small>
                                </div>
                                <div class="col-md-4 text-end">
                                    <button onclick="moderarAnuncio(${a.id}, 'aprovar')" class="btn btn-aprovar btn-sm me-2">
                                        <i class="bi bi-check-lg"></i> Aprovar
                                    </button>
                                    <button onclick="moderarAnuncio(${a.id}, 'recusar')" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash"></i> Recusar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Erro ao carregar moderação:", err);
            }
        }

        async function moderarAnuncio(id, acao) {
            const url = `http://localhost:8080/api/usuarios/anuncios/${id}/${acao}`;
            const metodo = acao === 'aprovar' ? 'PUT' : 'DELETE';

            try {
                const res = await fetch(url, { method: metodo });
                if (res.ok) {
                    alert(`Anúncio ${acao === 'aprovar' ? 'aprovado' : 'removido'} com sucesso!`);
                    carregarPendentes();
                }
            } catch (err) {
                alert("Erro ao processar moderação.");
            }
        }

        carregarPendentes();
    </script>
</body>
</html>
