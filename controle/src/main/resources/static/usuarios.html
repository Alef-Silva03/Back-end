<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Moradores - Lar Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul-petroleo: #012E46; --verde-escuro: #007A8A; }
        body { background-color: #f4f7f6; font-family: 'Montserrat', sans-serif; }
        .navbar-lar { background-color: var(--azul-petroleo); }
        .btn-acao { border-radius: 8px; transition: 0.3s; }
        .badge-status { padding: 8px 12px; border-radius: 20px; font-weight: 500; }
        .table thead { background-color: var(--azul-petroleo); color: white; }
        @media print { .btn-success, .btn-acao, .navbar, .modal { display: none !important; } }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-lar shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-arrow-left-circle me-2"></i> Voltar ao Painel
            </a>
            <span class="navbar-text text-white">Administração de Condôminos</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 style="color: var(--azul-petroleo); font-weight: 700;">
                <i class="bi bi-people-fill me-2"></i> Gestão de Moradores
            </h3>
            <button class="btn btn-success" onclick="window.print()">
                <i class="bi bi-printer"></i> Gerar Relatório
            </button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Apartamento</th>
                            <th>Perfil</th>
                            <th>Status Financeiro</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaMoradores">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: var(--azul-petroleo); color: white;">
                    <h5 class="modal-title">Atualizar Status</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEdicao">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">Morador</label>
                            <input type="text" id="editNome" class="form-control" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Situação Financeira</label>
                            <select id="editInadimplente" class="form-select">
                                <option value="false">Em Dia (Adimplente)</option>
                                <option value="true">Pendente (Inadimplente)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" style="background: var(--verde-escuro); border: none;">Salvar Alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioLogado || usuarioLogado.tipoUsuario !== 'SINDICO') {
            alert('Acesso restrito!');
            window.location.href = 'dashboard.html';
        }

        // Armazenamento local para busca rápida na edição
        let listaUsuarios = [];

        async function carregarMoradores() {
            try {
                const res = await fetch('http://localhost:8080/api/usuarios');
                listaUsuarios = await res.json();
                
                const tbody = document.getElementById('tabelaMoradores');
                tbody.innerHTML = listaUsuarios.map(u => `
                    <tr>
                        <td class="fw-bold">${u.nome}</td>
                        <td><span class="badge bg-light text-dark border">Apto ${u.numeroApartamento || 'S/N'}</span></td>
                        <td><small class="text-muted">${u.tipoUsuario.replace(/_/g, ' ')}</small></td>
                        <td>
                            <span class="badge-status badge ${u.inadimplente ? 'bg-danger-subtle text-danger' : 'bg-success-subtle text-success'}">
                                ${u.inadimplente ? '<i class="bi bi-x-circle"></i> Pendente' : '<i class="bi bi-check-circle"></i> Em dia'}
                            </span>
                        </td>
                        <td class="text-center">
                            <button onclick="abrirEdicao(${u.id})" class="btn btn-sm btn-outline-primary btn-acao me-2">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button onclick="deletarUsuario(${u.id})" class="btn btn-sm btn-outline-danger btn-acao">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Erro ao carregar lista:", err);
            }
        }

        function abrirEdicao(id) {
            const u = listaUsuarios.find(user => user.id === id);
            if (u) {
                document.getElementById('editId').value = u.id;
                document.getElementById('editNome').value = u.nome;
                document.getElementById('editInadimplente').value = u.inadimplente.toString();
                new bootstrap.Modal(document.getElementById('modalEditar')).show();
            }
        }

        // Lógica para Salvar a Edição
        document.getElementById('formEdicao').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const isInadimplente = document.getElementById('editInadimplente').value === "true";

            try {
                // Aqui você deve ter um endpoint no UsuarioController para atualizar apenas o status
                // Se não tiver, pode enviar o objeto inteiro ou criar um @PatchMapping
                const res = await fetch(`http://localhost:8080/api/usuarios/${id}/status-financeiro?inadimplente=${isInadimplente}`, {
                    method: 'PUT'
                });

                if (res.ok) {
                    alert('Status atualizado com sucesso!');
                    location.reload();
                } else {
                    alert('Erro ao atualizar status.');
                }
            } catch (err) {
                alert('Erro de conexão com o servidor.');
            }
        });

        async function deletarUsuario(id) {
            if(confirm('Deseja realmente remover este morador? Isso excluirá todos os dados dele.')) {
                try {
                    const res = await fetch(`http://localhost:8080/api/usuarios/${id}`, { method: 'DELETE' });
                    if(res.ok) {
                        alert('Morador removido!');
                        carregarMoradores();
                    }
                } catch (err) {
                    alert('Erro ao excluir usuário.');
                }
            }
        }

        carregarMoradores();
    </script>
</body>
</html>
