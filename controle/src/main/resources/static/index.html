<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lar Connect - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul-petroleo: #012E46; --verde-escuro: #007A8A; }
        body { background: #f8f9fa; font-family: 'Montserrat', sans-serif; }
        .login-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-auth { background: var/(--azul-petroleo); color: white; padding: 30px; border-radius: 15px 15px 0 0; text-align: center; }
        .btn-primary { background: var(--verde-escuro); border: none; }
        .btn-primary:hover { background: #005f6b; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card w-100" style="max-width: 400px;">
            <div class="header-auth">
                <h2>Lar Connect</h2>
                <small>Bem-vindo ao seu condomínio digital</small>
            </div>
            <div class="card-body p-4">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" id="email" class="form-control" required placeholder="exemplo@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" id="senha" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
                    <div class="text-center">
                        <a href="cadastro.html" class="text-decoration-none" style="color: var(--azul-petroleo)">Ainda não tem conta? Cadastre-se</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value
            };

            const response = await fetch('http://localhost:8080/api/usuarios/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });

            if(response.ok) {
                const usuario = await response.json();
                localStorage.setItem('usuarioLogado', JSON.stringify(usuario));
                window.location.href = 'dashboard.html';
            } else {
                alert('Credenciais inválidas!');
            }
        });
    </script>
</body>
</html>
