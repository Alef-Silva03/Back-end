<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprovar Anúncios - Lar Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul: #012E46; --verde: #007A8A; }
        body { background-color: #f4f7f6; font-family: 'Montserrat', sans-serif; }
        .navbar-lar { background-color: var(--azul); }
        .card-anuncio { border: none; border-radius: 15px; transition: 0.3s; }
        .card-anuncio:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-lar shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Voltar ao Painel</a>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="mb-4" style="color: var(--azul)">Anúncios Pendentes de Aprovação</h3>
    
    <div class="row" id="areaAnuncios">
        <div class="col-12 text-center" id="loader">
            <p class="text-muted">Carregando anúncios...</p>
        </div>
    </div>
</div>



<script>
    // 1. Função para carregar anúncios do banco
    async function carregarAnuncios() {
        try {
            const res = await fetch('http://localhost:8080/api/usuarios/anuncios/pendentes');
            const anuncios = await res.json();
            const area = document.getElementById('areaAnuncios');
            
            if (anuncios.length === 0) {
                area.innerHTML = '<div class="col-12"><div class="alert alert-info">Nenhum anúncio pendente no momento.</div></div>';
                return;
            }

            area.innerHTML = anuncios.map(a => `
                <div class="col-md-6 mb-4">
                    <div class="card p-3 shadow-sm card-anuncio border-start border-warning border-4">
                        <div class="d-flex justify-content-between">
                            <h5>${a.titulo}</h5>
                            <span class="badge bg-secondary">${a.tipo}</span>
                        </div>
                        <p class="text-muted mb-1">${a.descricao}</p>
                        <p class="small"><strong>Anunciante:</strong> ${a.anunciante.nome} | <strong>Valor:</strong> R$ ${a.valor.toFixed(2)}</p>
                        <div class="d-flex gap-2">
                            <button onclick="decidirAnuncio(${a.id}, 'aprovar')" class="btn btn-success btn-sm w-50">
                                <i class="bi bi-check-lg"></i> Aprovar
                            </button>
                            <button onclick="decidirAnuncio(${a.id}, 'recusar')" class="btn btn-danger btn-sm w-50">
                                <i class="bi bi-trash"></i> Recusar
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('areaAnuncios').innerHTML = '<div class="alert alert-danger">Erro ao conectar com o servidor.</div>';
        }
    }

    // 2. Função para Aprovar ou Recusar
    async function decidirAnuncio(id, acao) {
        const metodo = acao === 'aprovar' ? 'PUT' : 'DELETE';
        const urlSuffix = acao === 'aprovar' ? 'aprovar' : 'recusar';

        const res = await fetch(`http://localhost:8080/api/usuarios/anuncios/${id}/${urlSuffix}`, {
            method: metodo
        });

        if (res.ok) {
            alert(acao === 'aprovar' ? 'Anúncio aprovado e visível para todos!' : 'Anúncio removido.');
            carregarAnuncios(); // Recarrega a lista
        } else {
            alert('Erro ao processar solicitação.');
        }
    }

    // Inicializa a página
    carregarAnuncios();
</script>

</body>
</html>
