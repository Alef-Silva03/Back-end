<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lar Connect - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul-petroleo: #012E46; --verde-escuro: #007A8A; }
        body { background: #f8f9fa; font-family: 'Montserrat', sans-serif; }
        .login-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-auth { background: var/(--azul-petroleo); color: white; padding: 30px; border-radius: 15px 15px 0 0; text-align: center; }
        .btn-primary { background: var(--verde-escuro); border: none; }
        .btn-primary:hover { background: #005f6b; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="card login-card mx-auto" style="max-width: 600px;">
        <div class="header-auth"><h3>Cadastro Lar Connect</h3></div>
        <div class="card-body p-4">
            <form id="cadForm">
                <div class="row">
                    <div class="col-md-6 mb-3"><label>Nome</label><input type="text" id="nome" class="form-control" required></div>
                    <div class="col-md-6 mb-3"><label>CPF</label><input type="text" id="cpf" class="form-control" required></div>
                </div>
                <div class="mb-3"><label>E-mail</label><input type="email" id="email" class="form-control" required></div>
                <div class="mb-3"><label>Senha</label><input type="password" id="senha" class="form-control" required></div>
                <div class="mb-3">
                    <label>Perfil de Usuário</label>
                    <select id="tipoUsuario" class="form-select">
                        <option value="MORADOR_PROPRIETARIO">Morador Proprietário</option>
                        <option value="MORADOR_INQUILINO">Morador Inquilino</option>
                        <option value="SINDICO">Síndico</option>
                        <option value="FUNCIONARIO">Funcionário</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
            </form>
        </div>
    </div>
</div>
<script>
    document.getElementById('cadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const usuario = {
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value,
            tipoUsuario: document.getElementById('tipoUsuario').value
        };
        const res = await fetch('http://localhost:8080/api/usuarios/cadastrar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(usuario)
        });
        if(res.ok) { alert('Cadastro realizado!'); window.location.href = 'index.html'; }
    });
</script>
</body>
</html>
