<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificados - Lar Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #012E46; --verde: #007A8A; }
        body { background-color: #f4f7f6; font-family: 'Montserrat', sans-serif; }
        .navbar-lar { background-color: var(--azul); }
        .card-anuncio { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.3s; }
        .card-anuncio:hover { transform: translateY(-5px); }
        .badge-tipo { background-color: var(--verde); color: white; border-radius: 10px; padding: 5px 10px; font-size: 0.8rem; text-transform: capitalize; }
        .btn-anunciar { background-color: var(--azul); color: white; border-radius: 10px; font-weight: bold; }
        .price-tag { color: var(--verde); font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-lar shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-arrow-left-circle me-2"></i> Voltar ao Painel
            </a>
            <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#modalNovoAnuncio">
                <i class="bi bi-plus-lg"></i> Criar Anúncio
            </button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold" style="color: var(--azul)">Classificados do Condomínio</h2>
                <p class="text-muted">Itens e serviços anunciados exclusivamente por moradores.</p>
            </div>
        </div>

        <div class="row g-4" id="gridAnuncios">
            <div class="col-12 text-center py-5" id="msgCarregando">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Carregando anúncios...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNovoAnuncio" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 20px;">
                <div class="modal-header" style="background: var(--azul); color: white; border-radius: 20px 20px 0 0;">
                    <h5 class="modal-title">Novo Anúncio</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-warning small">
                        <i class="bi bi-exclamation-triangle"></i> Seu anúncio passará pela aprovação do síndico.
                    </div>
                    <form id="formAnuncio">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Título</label>
                            <input type="text" id="tituloAnuncio" class="form-control" placeholder="Ex: Bicicleta Aro 29" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Categoria</label>
                                <select id="tipoAnuncio" class="form-select">
                                    <option value="VENDA">Venda</option>
                                    <option value="ALUGUEL">Aluguel</option>
                                    <option value="SERVICO">Serviço</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Preço (R$)</label>
                                <input type="number" step="0.01" id="valorAnuncio" class="form-control" placeholder="0,00" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Descrição</label>
                            <textarea id="descAnuncio" class="form-control" rows="3" placeholder="Descreva detalhes do item..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Enviar para Aprovação</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Pega os dados do usuário do localStorage
        const userLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!userLogado) window.location.href = 'index.html';

        async function carregarAnuncios() {
            try {
                const res = await fetch('http://localhost:8080/api/usuarios/anuncios/aprovados');
                const anuncios = await res.json();
                const grid = document.getElementById('gridAnuncios');

                if (anuncios.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center text-muted py-5">Nenhum anúncio disponível no momento.</div>';
                    return;
                }

                grid.innerHTML = anuncios.map(a => `
                    <div class="col-md-4">
                        <div class="card h-100 card-anuncio shadow-sm">
                            <div class="card-body">
                                <span class="badge badge-tipo mb-2">${a.tipo}</span>
                                <h5 class="fw-bold">${a.titulo}</h5>
                                <p class="text-muted small">${a.descricao}</p>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="price-tag">R$ ${a.valor.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span>
                                    <small class="text-muted">Apto: ${a.anunciante?.numeroApartamento || 'N/A'}</small>
                                </div>
                                <hr>
                                <button onclick="alert('Funcionalidade de contato disponível após aprovação!')" class="btn btn-sm w-100 btn-outline-success">
                                    <i class="bi bi-whatsapp"></i> Contatar Vizinho
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('gridAnuncios').innerHTML = '<p class="text-center text-danger">Erro ao carregar anúncios. Verifique se o servidor está rodando.</p>';
            }
        }

        document.getElementById('formAnuncio').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Montando o JSON para o backend
            const novoAnuncio = {
                titulo: document.getElementById('tituloAnuncio').value,
                tipo: document.getElementById('tipoAnuncio').value, 
                valor: parseFloat(document.getElementById('valorAnuncio').value),
                descricao: document.getElementById('descAnuncio').value,
                aprovado: false,
                anunciante: { id: parseInt(userLogado.id) } 
            };

            try {
                const res = await fetch('http://localhost:8080/api/usuarios/anuncios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(novoAnuncio)
                });

                if (res.ok) {
                    alert("Sucesso! Seu anúncio foi enviado e aguarda a moderação do síndico.");
                    location.reload();
                } else {
                    const erroTexto = await res.text();
                    alert("Erro ao cadastrar: " + erroTexto);
                }
            } catch (err) {
                alert("Erro crítico: Verifique sua conexão com o banco de dados.");
            }
        });

        // Inicia o carregamento da lista ao abrir a página
        carregarAnuncios();
    </script>
</body>
</html>
