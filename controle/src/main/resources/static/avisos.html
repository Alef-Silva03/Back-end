<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mural de Avisos - Lar Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul: #012E46; --verde: #007A8A; }
        .btn-salvar { background-color: var(--verde); color: white; border: none; }
        .header-page { background-color: var(--azul); color: white; padding: 20px; border-radius: 0 0 15px 15px; }
    </style>
</head>
<body class="bg-light">
    <div class="header-page mb-4 text-center">
        <h2>Mural de Avisos</h2>
    </div>
    <div class="container">
        <div class="card p-4 shadow-sm mb-4">
            <h5>Novo Comunicado</h5>
            <form id="formAviso">
                <input type="text" id="titulo" class="form-control mb-2" placeholder="Título do Aviso" required>
                <textarea id="conteudo" class="form-control mb-2" rows="3" placeholder="Mensagem para os moradores..." required></textarea>
                <button type="submit" class="btn btn-salvar w-100">Publicar no Painel</button>
            </form>
        </div>
        <div id="listaAvisos" class="list-group">
            </div>
    </div>
    <script>
        document.getElementById('formAviso').addEventListener('submit', async (e) => {
            e.preventDefault();
            const aviso = { 
                titulo: document.getElementById('titulo').value,
                conteudo: document.getElementById('conteudo').value,
                dataPublicacao: new Date().toISOString()
            };
            // Aqui você faria o fetch para o seu AvisoController
            alert('Aviso publicado com sucesso!');
            location.reload();
        });
    </script>
</body>
</html>
