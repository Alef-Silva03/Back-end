<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Encomendas - Lar Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #012E46; --verde: #007A8A; }
        body { background-color: #f4f7f6; font-family: 'Montserrat', sans-serif; }
        .navbar-lar { background-color: var(--azul); }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-verde { background-color: var(--verde); color: white; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-lar shadow-sm mb-4">
        <div class="container"><a class="navbar-brand" href="dashboard.html">Lar Connect Encomendas</a></div>
    </nav>

    <div class="container">
        <div id="areaRegistro" class="card card-custom p-4 mb-5 d-none">
            <h4 class="fw-bold text-primary mb-3">Registrar Nova Encomenda</h4>
            <form id="formEncomenda" class="row g-3">
                <div class="col-md-4"><input type="text" id="destinatario" class="form-control" placeholder="Nome do Morador" required></div>
                <div class="col-md-2"><input type="text" id="apto" class="form-control" placeholder="Apto" required></div>
                <div class="col-md-4"><input type="text" id="desc" class="form-control" placeholder="Ex: Caixa Amazon" required></div>
                <div class="col-md-2"><button type="submit" class="btn btn-verde w-100">Registrar</button></div>
            </form>
        </div>

        <div class="card card-custom p-4">
            <h4 class="fw-bold mb-4">Pacotes na Portaria</h4>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Data</th>
                            <th>Apto</th>
                            <th>Destinatário</th>
                            <th>Descrição</th>
                            <th>Status</th>
                            <th id="thAcoes" class="d-none">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaEncomendas"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('usuarioLogado'));
        if(!user) window.location.href = 'index.html';

        // Mostra campos de registro apenas para funcionários
        if(user.tipoUsuario === 'FUNCIONARIO' || user.tipoUsuario === 'SINDICO') {
            document.getElementById('areaRegistro').classList.remove('d-none');
            document.getElementById('thAcoes').classList.remove('d-none');
        }

        async function carregarEncomendas() {
            const res = await fetch('http://localhost:8080/api/encomendas');
            const dados = await res.json();
            const list = document.getElementById('listaEncomendas');
            
            list.innerHTML = dados.map(e => `
                <tr>
                    <td>${new Date(e.dataRecebimento).toLocaleDateString()}</td>
                    <td><strong>${e.apto || e.apartamento}</strong></td>
                    <td>${e.destinatario}</td>
                    <td>${e.descricao}</td>
                    <td><span class="badge ${e.retirada ? 'bg-success' : 'bg-warning text-dark'}">
                        ${e.retirada ? 'Retirado' : 'Aguardando'}</span>
                    </td>
                    <td class="${(user.tipoUsuario === 'FUNCIONARIO') ? '' : 'd-none'}">
                        ${!e.retirada ? `<button onclick="baixar(${e.id})" class="btn btn-sm btn-outline-success">Dar Baixa</button>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('formEncomenda').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const payload = {
                destinatario: document.getElementById('destinatario').value,
                apartamento: document.getElementById('apto').value,
                descricao: document.getElementById('desc').value
            };
            await fetch('http://localhost:8080/api/encomendas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            location.reload();
        });

        async function baixar(id) {
            await fetch(`http://localhost:8080/api/encomendas/${id}/retirar`, { method: 'PUT' });
            carregarEncomendas();
        }

        carregarEncomendas();
    </script>
</body>
</html>
