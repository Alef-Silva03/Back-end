<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Administrativo - Mercado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #e9ecef; height: 100vh; display: flex; align-items: center; }
        .auth-card { width: 100%; max-width: 400px; margin: auto; }
        .nav-pills .nav-link.active { background-color: #212529; }
        .btn-dark { background-color: #212529; }
        .back-link { text-decoration: none; color: #6c757d; font-size: 0.9rem; transition: 0.2s; }
        .back-link:hover { color: #212529; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="mb-3">
        <a href="index.html" class="back-link fw-bold">
            ← Voltar para a Página Inicial
        </a>
    </div>

    <div class="card shadow-lg border-0">
        <div class="card-header bg-white pb-0 border-0">
            <ul class="nav nav-pills nav-fill" id="pills-tab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login">Login</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="tab-cadastro" data-bs-toggle="pill" data-bs-target="#pills-cadastro">Cadastro</button>
                </li>
            </ul>
        </div>
        
        <div class="card-body p-4">
            <div id="status-alert" class="alert d-none small text-center mb-3"></div>

            <div class="tab-content">
                
                <div class="tab-pane fade show active" id="pills-login">
                    <h4 class="text-center mb-4">Entrar no Painel</h4>
                    <form action="/login" method="POST"> 
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Login</label>
                            <input type="text" name="username" class="form-control" required placeholder="Seu usuário">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Senha</label>
                            <input type="password" name="password" class="form-control" required placeholder="********">
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2">Acessar Sistema</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="pills-cadastro">
                    <h4 class="text-center mb-4">Novo Administrador</h4>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Definir Usuário</label>
                        <input type="text" id="reg-user" class="form-control" placeholder="Ex: admin_joao">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Definir Senha</label>
                        <input type="password" id="reg-pass" class="form-control" placeholder="Mínimo 6 caracteres">
                    </div>
                    <button onclick="registrarUsuario()" class="btn btn-outline-dark w-100 py-2">Criar Conta</button>
                    <div id="msg-sucesso" class="mt-3 text-success text-center d-none small">Usuário criado! Vá para Login.</div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Gerenciamento de alertas de erro/logout do Spring Security
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const alertBox = document.getElementById('status-alert');
        
        if (urlParams.has('error')) {
            alertBox.classList.remove('d-none');
            alertBox.classList.add('alert-danger');
            alertBox.innerText = "Usuário ou senha incorretos.";
        } else if (urlParams.has('logout')) {
            alertBox.classList.remove('d-none');
            alertBox.classList.add('alert-success');
            alertBox.innerText = "Você saiu do sistema.";
        }
    };

    async function registrarUsuario() {
        const login = document.getElementById('reg-user').value;
        const senha = document.getElementById('reg-pass').value;

        if(!login || !senha) return alert("Preencha todos os campos!");

        try {
            const response = await fetch('/api/public/usuarios/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, senha })
            });

            if(response.ok) {
                document.getElementById('msg-sucesso').classList.remove('d-none');
                document.getElementById('reg-user').value = '';
                document.getElementById('reg-pass').value = '';
            } else {
                alert("Erro ao cadastrar. Talvez o usuário já exista.");
            }
        } catch (error) {
            console.error("Erro:", error);
        }
    }
</script>
</body>
</html>
