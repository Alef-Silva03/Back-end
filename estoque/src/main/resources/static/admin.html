<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Smart Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .kpi-card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .kpi-card:hover { transform: translateY(-5px); }
        .bg-gradient-primary { background: linear-gradient(45deg, #4e73df, #224abe); }
        .bg-gradient-success { background: linear-gradient(45deg, #1cc88a, #13855c); }
        .bg-gradient-warning { background: linear-gradient(45deg, #f6c23e, #dda20a); }
        
        .table-responsive { max-height: 500px; overflow-y: auto; }
        thead th { position: sticky; top: 0; background-color: #f8f9fa !important; z-index: 1; }
        
        .img-thumb { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; background: #eee; border: 1px solid #ddd; }
        .img-preview { width: 120px; height: 120px; object-fit: contain; border-radius: 10px; border: 2px dashed #0d6efd; padding: 5px; background-color: #fff; cursor: pointer; transition: 0.3s; }
        .img-preview:hover { background-color: #f0f7ff; border-color: #0a58ca; }
        .product-name { font-weight: 600; color: #2d3436; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">📦 Smart Market Admin</a>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Sair do Sistema</button>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 g-3">
        <div class="col-md-4">
            <div class="card kpi-card bg-gradient-primary text-white shadow">
                <div class="card-body text-center">
                    <div class="small opacity-75 text-uppercase">Faturamento Total</div>
                    <h3 class="fw-bold mb-0" id="fatTotal">R$ 0,00</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card kpi-card bg-gradient-success text-white shadow">
                <div class="card-body text-center">
                    <div class="small opacity-75 text-uppercase">Vendas Realizadas</div>
                    <h3 class="fw-bold mb-0" id="qtdVendas">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card kpi-card bg-gradient-warning text-dark shadow">
                <div class="card-body text-center">
                    <div class="small fw-bold opacity-75 text-uppercase">Produtos em Alerta</div>
                    <h3 class="fw-bold mb-0" id="alertaEstoque">0</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm p-3 mb-4 border-0">
                <h5 class="fw-bold border-bottom pb-2" id="formTitle">Novo Produto</h5>
                <input type="hidden" id="prodId">
                <input type="hidden" id="prodAtivo" value="true">
                
                <div class="text-center mb-3">
                    <label class="small fw-bold d-block mb-1">IMAGEM DO PRODUTO</label>
                    <div onclick="document.getElementById('fileInput').click()">
                        <img id="previewImg" src="/produtos/default.jpg" class="img-preview" title="Clique para alterar">
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="converterImagem(this)">
                    <p class="small text-primary mt-1">Clique na imagem para selecionar arquivo</p>
                </div>

                <div class="mb-2">
                    <label class="small fw-bold">Nome do Produto</label>
                    <input type="text" id="nomeProd" class="form-control form-control-sm">
                </div>
                <div class="mb-2">
                    <label class="small fw-bold">Código de Barras</label>
                    <input type="text" id="codeProd" class="form-control form-control-sm">
                </div>
                <div class="row mb-2">
                    <div class="col">
                        <label class="small fw-bold">Preço (R$)</label>
                        <input type="number" step="0.01" id="precoProd" class="form-control form-control-sm">
                    </div>
                    <div class="col">
                        <label class="small fw-bold">Estoque</label>
                        <input type="number" id="estoqueProd" class="form-control form-control-sm">
                    </div>
                </div>
                
                <input type="hidden" id="urlImagemProd">
                
                <div class="d-grid gap-2 mt-3">
                    <button onclick="salvarProduto()" id="btnSalvar" class="btn btn-primary fw-bold shadow-sm">SALVAR PRODUTO</button>
                    <button onclick="limparForm()" id="btnCancelar" class="btn btn-light btn-sm d-none">Cancelar Edição</button>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm p-3 border-0 mb-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                    <h5 class="fw-bold mb-0">Controle de Inventário</h5>
                    <input type="text" id="inputBusca" class="form-control form-control-sm w-50" 
                           placeholder="🔍 Filtrar por nome ou código..." onkeyup="filtrarTabela()">
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Produto</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaEstoque"></tbody>
                    </table>
                </div>
            </div>

            <div class="card shadow-sm p-3 border-0">
                <h5 class="fw-bold border-bottom pb-2 text-muted">Atividade Recente</h5>
                <table class="table table-sm">
                    <thead>
                        <tr class="small text-muted">
                            <th>ID</th>
                            <th>VALOR TOTAL</th>
                            <th>DATA/HORA</th>
                        </tr>
                    </thead>
                    <tbody id="listaVendasRecentes"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- LÓGICA DE IMAGEM ---
    function converterImagem(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                document.getElementById('urlImagemProd').value = base64;
                document.getElementById('previewImg').src = base64;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- DASHBOARD E DADOS ---
    async function refreshData() {
        carregarEstoque();
        atualizarDashboard();
    }

    async function atualizarDashboard() {
        try {
            const res = await fetch('/api/admin/resumo');
            if (res.ok) {
                const dados = await res.json();
                document.getElementById('fatTotal').innerText = `R$ ${dados.faturamentoTotal.toFixed(2)}`;
                document.getElementById('qtdVendas').innerText = dados.quantidadeVendas;
                document.getElementById('alertaEstoque').innerText = dados.produtosEmAlerta;
            }
            carregarVendasRecentes();
        } catch (e) { console.error(e); }
    }

    async function carregarVendasRecentes() {
        const res = await fetch('/api/admin/vendas/recentes');
        if (!res.ok) return;
        const vendas = await res.json();
        const corpo = document.getElementById('listaVendasRecentes');
        corpo.innerHTML = vendas.map(v => `
            <tr class="small">
                <td>#${v.id}</td>
                <td class="fw-bold">R$ ${v.valorTotal.toFixed(2)}</td>
                <td>${v.dataVenda ? new Date(v.dataVenda).toLocaleString() : '---'}</td>
            </tr>`).join('');
    }

    async function carregarEstoque() {
        const res = await fetch('/api/admin/estoque');
        const produtos = await res.json();
        const corpo = document.getElementById('tabelaEstoque');
        corpo.innerHTML = '';

        produtos.forEach(p => {
            const lowStock = p.quantidadeEstoque < 5;
            const inativo = !p.ativo;
            const pJson = JSON.stringify(p).replace(/'/g, "&apos;");

            corpo.innerHTML += `
                <tr class="${lowStock ? 'table-danger' : ''}" style="${inativo ? 'opacity:0.5' : ''}">
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${p.urlImagem || '/produtos/default.jpg'}" class="img-thumb me-2" 
                                 onerror="this.src='https://via.placeholder.com/50?text=S/F'">
                            <div>
                                <div class="product-name">${p.nome}</div>
                                <small class="text-muted">${p.codigoBarras}</small>
                            </div>
                        </div>
                    </td>
                    <td>R$ ${p.preco.toFixed(2)}</td>
                    <td><span class="badge ${lowStock ? 'bg-danger' : 'bg-dark'}">${p.quantidadeEstoque}</span></td>
                    <td class="text-center">
                        <div class="btn-group">
                            <button onclick='prepararEdicao(${pJson})' class="btn btn-sm btn-outline-primary">Editar</button>
                            <button onclick="deletarProduto(${p.id})" class="btn btn-sm ${inativo ? 'btn-success' : 'btn-outline-danger'}">
                                ${inativo ? 'Ativar' : 'Sair'}
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    // --- AÇÕES DO FORMULÁRIO ---
    async function salvarProduto() {
        const p = {
            id: document.getElementById('prodId').value || null,
            nome: document.getElementById('nomeProd').value,
            codigoBarras: document.getElementById('codeProd').value,
            preco: parseFloat(document.getElementById('precoProd').value),
            quantidadeEstoque: parseInt(document.getElementById('estoqueProd').value),
            urlImagem: document.getElementById('urlImagemProd').value,
            ativo: document.getElementById('prodAtivo').value === "true"
        };

        if(!p.nome || !p.codigoBarras) return alert("Preencha Nome e Código!");

        const res = await fetch('/api/admin/produtos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(p)
        });
        
        if(res.ok) {
            limparForm();
            refreshData();
        }
    }

    function prepararEdicao(p) {
        document.getElementById('formTitle').innerText = "Editando Produto";
        document.getElementById('prodId').value = p.id;
        document.getElementById('prodAtivo').value = p.ativo;
        document.getElementById('nomeProd').value = p.nome;
        document.getElementById('codeProd').value = p.codigoBarras;
        document.getElementById('precoProd').value = p.preco;
        document.getElementById('estoqueProd').value = p.quantidadeEstoque;
        document.getElementById('urlImagemProd').value = p.urlImagem || '';
        document.getElementById('previewImg').src = p.urlImagem || '/produtos/default.jpg';
        
        document.getElementById('btnSalvar').innerText = "ATUALIZAR";
        document.getElementById('btnCancelar').classList.remove('d-none');
        window.scrollTo(0,0);
    }

    function limparForm() {
        document.getElementById('formTitle').innerText = "Novo Produto";
        document.getElementById('prodId').value = '';
        document.getElementById('prodAtivo').value = "true";
        document.getElementById('nomeProd').value = '';
        document.getElementById('codeProd').value = '';
        document.getElementById('precoProd').value = '';
        document.getElementById('estoqueProd').value = '';
        document.getElementById('urlImagemProd').value = '';
        document.getElementById('previewImg').src = '/produtos/default.jpg';
        document.getElementById('btnSalvar').innerText = "SALVAR PRODUTO";
        document.getElementById('btnCancelar').classList.add('d-none');
    }

    async function deletarProduto(id) {
        if(!confirm("Deseja alterar o status?")) return;
        await fetch(`/api/admin/produtos/${id}`, { method: 'DELETE' });
        refreshData();
    }

    function filtrarTabela() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const linhas = document.querySelectorAll('#tabelaEstoque tr');
        linhas.forEach(l => l.style.display = l.innerText.toLowerCase().includes(termo) ? '' : 'none');
    }

    function logout() {
        const form = document.createElement('form');
        form.method = 'POST'; form.action = '/logout';
        document.body.appendChild(form); form.submit();
    }

    refreshData();
</script>
</body>
</html>
