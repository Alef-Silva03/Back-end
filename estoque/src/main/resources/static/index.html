<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bem-vindo ao Mercado Autônomo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; color: white; }
        .choice-card { transition: transform 0.3s; cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .choice-card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="d-flex align-items-center">

<div class="container text-center">
    <h1 class="display-3 fw-bold mb-5">Sistema Smart Market</h1>
    
    <div class="row justify-content-center g-4">
        <div class="col-md-4">
            <div class="card choice-card p-5 h-100 text-white" onclick="location.href='/terminal.html'">
                <div class="display-1 mb-3">🛒</div>
                <h3>Terminal do Cliente</h3>
                <p>Autoatendimento e Finalização de Compras.</p>
                <button class="btn btn-light mt-auto">Acessar Terminal</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card choice-card p-5 h-100 text-white" onclick="location.href='/admin.html'">
                <div class="display-1 mb-3">⚙️</div>
                <h3>Gestão & Estoque</h3>
                <p>Acesso restrito para administradores e reposição.</p>
                <button class="btn btn-outline-light mt-auto">Painel Administrativo</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
