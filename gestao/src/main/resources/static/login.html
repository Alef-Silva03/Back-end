<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - SGOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #f4f7f6 0%, #dfe9f3 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .card { width: 100%; max-width: 400px; border-radius: 15px; border: none; }
        .btn-primary { background-color: #007bff; border: none; padding: 12px; }
    </style>
</head>
<body>
    <div class="card shadow-lg">
        <div class="card-body p-5">
            <h3 class="text-center mb-4 fw-bold">Acesso ao Sistema</h3>
            <form id="formLogin">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="exemplo@oficina.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btnEntrar" class="btn btn-primary w-100 fw-bold">Entrar</button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-muted small">Ainda não tem conta? <a href="cadastro.html" class="text-decoration-none">Criar uma conta</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnEntrar');
            btn.disabled = true;
            btn.innerText = "Verificando...";

            const email = document.getElementById('email').value.trim(); // .trim() remove espaços acidentais
            const senha = document.getElementById('senha').value;
            
            // Gerando o Header de Autenticação Basic
            const authHeader = 'Basic ' + btoa(email + ':' + senha);

            try {
                const response = await fetch('/api/usuarios/me', {
                    method: 'GET',
                    headers: { 
                        'Authorization': authHeader,
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const user = await response.json();
                    
                    // Limpa lixos antigos e salva a nova sessão
                    localStorage.clear();
                    localStorage.setItem('auth', authHeader);
                    localStorage.setItem('user_tipo', user.tipo);
                    localStorage.setItem('user_nome', user.nome);
                    
                    // Redirecionamento baseado no TipoUsuario (Enum)
                    const tipo = user.tipo;
                    if (tipo === 'ADMINISTRADOR') {
                        window.location.replace('dashboard_admin.html');
                    } else if (tipo === 'FUNCIONARIO') {
                        window.location.replace('dashboard_funcionario.html');
                    } else {
                        window.location.replace('minha_area_cliente.html');
                    }
                } else if (response.status === 401) {
                    alert("E-mail ou senha incorretos.");
                    btn.disabled = false;
                    btn.innerText = "Entrar";
                } else {
                    alert("Erro no servidor: " + response.status);
                    btn.disabled = false;
                    btn.innerText = "Entrar";
                }
            } catch (err) {
                console.error(err);
                alert("Erro ao conectar com o servidor. Verifique se o backend está rodando.");
                btn.disabled = false;
                btn.innerText = "Entrar";
            }
        });
    </script>
</body>
</html>
