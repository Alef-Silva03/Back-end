<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Abertura de OS - SGOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 700px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .step-badge { width: 30px; height: 30px; background: #0d6efd; color: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="mb-4">
            <a href="dashboard_funcionario.html" class="text-decoration-none text-muted"><i class="bi bi-arrow-left"></i> Voltar</a>
        </div>
        
        <h2 class="mb-4 text-center">Abrir Ordem de Serviço</h2>

        <form id="formOS">
            <div class="mb-4">
                <label class="form-label fw-bold"><span class="step-badge">1</span> Selecionar Veículo (Placa)</label>
                <select id="selectVeiculo" class="form-select" required>
                    <option value="">Carregando veículos...</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold"><span class="step-badge">2</span> Mecânico Responsável</label>
                <select id="selectMecanico" class="form-select" required>
                    <option value="">Carregando mecânicos...</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold"><span class="step-badge">3</span> Descrição Inicial do Problema</label>
                <textarea id="descricao" class="form-control" rows="3" placeholder="Relato do cliente..." required></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Status Inicial</label>
                    <select id="status" class="form-select">
                        <option value="ORÇAMENTO">ORÇAMENTO</option>
                        <option value="EM_ANDAMENTO">EM ANDAMENTO</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Data de Abertura</label>
                    <input type="text" class="form-control" id="dataAtual" disabled>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fs-5 mt-3">
                <i class="bi bi-file-earmark-plus"></i> Gerar Ordem de Serviço
            </button>
        </form>
    </div>
</div>

<script>
    const auth = localStorage.getItem('auth');
    if (!auth) window.location.href = 'login.html';

    document.getElementById('dataAtual').value = new Date().toLocaleDateString('pt-BR');

    // Carrega dados iniciais para os Selects
    async function carregarDados() {
        try {
            // Busca Veículos
            const resVeiculos = await fetch('/api/veiculos', { headers: { 'Authorization': auth } });
            const veiculos = await resVeiculos.json();
            const selectV = document.getElementById('selectVeiculo');
            selectV.innerHTML = '<option value="">Escolha o veículo...</option>' + 
                veiculos.map(v => `<option value="${v.id}">${v.placa} - ${v.marca} ${v.modelo} (${v.cliente.nome})</option>`).join('');

            // Busca Mecânicos (Usuarios com tipo FUNCIONARIO ou ADMIN)
            const resMecanicos = await fetch('/api/usuarios/tipo/FUNCIONARIO', { headers: { 'Authorization': auth } });
            const mecanicos = await resMecanicos.json();
            const selectM = document.getElementById('selectMecanico');
            selectM.innerHTML = '<option value="">Selecione o mecânico...</option>' + 
                mecanicos.map(m => `<option value="${m.id}">${m.nome}</option>`).join('');

        } catch (err) {
            alert("Erro ao carregar dados do sistema.");
        }
    }

    document.getElementById('formOS').addEventListener('submit', async (e) => {
        e.preventDefault();

        const novaOS = {
            veiculo: { id: document.getElementById('selectVeiculo').value },
            mecanicoResponsavel: { id: document.getElementById('selectMecanico').value },
            status: document.getElementById('status').value,
            // A descrição pode ser enviada para um campo de observações se você tiver no Model
            valorTotal: 0.0
        };

        const response = await fetch('/api/ordens-servico', {
            method: 'POST',
            headers: { 
                'Authorization': auth,
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify(novaOS)
        });

        if (response.ok) {
            alert("OS Gerada com Sucesso!");
            window.location.href = "dashboard_funcionario.html";
        } else {
            alert("Erro ao abrir Ordem de Serviço.");
        }
    });

    carregarDados();
</script>
</body>
</html>
